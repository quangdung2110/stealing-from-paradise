# ============================================================
# FLASH SALE — PRODUCTION OVERRIDE (CD Server Deploy)
# ============================================================
# Pulls pre-built images from GHCR instead of building on the server.
#
# `image:` in this override takes precedence over `build:` in
# docker-compose.yml, so Docker Compose will pull :prod-latest
# instead of rebuilding.
#
# Images are tagged as :prod-latest (pushed by deploy.yml on main merge).
#
# USE: docker-compose \
#          -f docker-compose.yml \
#          -f docker-compose.prod-pulled.yml \
#          --env-file .env.production \
#          up -d
#
# NOTE: Run from the project root.
#       IMAGE_PREFIX = GHCR namespace (owner/repo), e.g. "myusername/flashsale".
#       .env.production is generated by deploy.yml (gitignored).
# ============================================================

services:
  # ── Backend — all env vars from .env.production ──
  discovery-service:
    image: ghcr.io/${IMAGE_PREFIX}/discovery-service:prod-latest
    env_file: .env.production

  api-gateway:
    image: ghcr.io/${IMAGE_PREFIX}/api-gateway:prod-latest
    env_file: .env.production
    # No host port binding in prod — nginx (reverse-proxy) reaches the gateway
    # over the Docker network as `fs-gateway:8080`. This eliminates the entire
    # "port 8080 already in use" class of deploy failures and keeps the gateway
    # private (only reachable through the reverse-proxy).
    ports: []
    expose:
      - "8080"

  identity-service:
    image: ghcr.io/${IMAGE_PREFIX}/identity-service:prod-latest
    env_file: .env.production

  payment-service:
    image: ghcr.io/${IMAGE_PREFIX}/payment-service:prod-latest
    env_file: .env.production

  refund-service:
    image: ghcr.io/${IMAGE_PREFIX}/refund-service:prod-latest
    env_file: .env.production

  order-service:
    image: ghcr.io/${IMAGE_PREFIX}/order-service:prod-latest
    env_file: .env.production

  chat-service:
    image: ghcr.io/${IMAGE_PREFIX}/chat-service:prod-latest
    env_file: .env.production

  flashsale-service:
    image: ghcr.io/${IMAGE_PREFIX}/flashsale-service:prod-latest
    env_file: .env.production

  product-service:
    image: ghcr.io/${IMAGE_PREFIX}/product-service:prod-latest
    env_file: .env.production

  search-service:
    image: ghcr.io/${IMAGE_PREFIX}/search-service:prod-latest
    env_file: .env.production

  notification-service:
    image: ghcr.io/${IMAGE_PREFIX}/notification-service:prod-latest
    env_file: .env.production

  # ── Frontend — read VITE_ vars from .env.production ──
  # No host port binding in prod — nginx (reverse-proxy) routes /, /seller/,
  # /admin/ to these containers over the Docker network. Exposing 3000-3002
  # to the host would let users bypass the reverse-proxy and hit the SPA
  # (and dev-mode Vite, if any) directly.
  customer-app:
    image: ghcr.io/${IMAGE_PREFIX}/customer-app:prod-latest
    env_file: .env.production
    ports: []

  seller-app:
    image: ghcr.io/${IMAGE_PREFIX}/seller-app:prod-latest
    env_file: .env.production
    ports: []

  admin-app:
    image: ghcr.io/${IMAGE_PREFIX}/admin-app:prod-latest
    env_file: .env.production
    ports: []

  # ── Reverse Proxy ────────────────────────────────────────────
  reverse-proxy:
    image: ghcr.io/${IMAGE_PREFIX}/reverse-proxy:prod-latest
    env_file: .env.production
    ports: ["${PORT_REVERSE_PROXY:-80}:80"]
    environment:
      - NGINX_PORT=80
      - GATEWAY_HOST=fs-gateway
      - GATEWAY_PORT=8080
      # FE prod images run nginx listening on :80 inside the container.
      # Each FE container has its own DNS name on the Docker network, so
      # they can share port 80 — the upstream block disambiguates by host.
      - CUSTOMER_HOST=fs-customer-fe
      - CUSTOMER_PORT=80
      - SELLER_HOST=fs-seller-fe
      - SELLER_PORT=80
      - ADMIN_HOST=fs-admin-fe
      - ADMIN_PORT=80
