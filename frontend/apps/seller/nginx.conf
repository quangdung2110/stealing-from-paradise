server {
    listen 80;
    server_name _;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/xml+rss text/javascript application/javascript application/json application/x-javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    # Client upload size
    client_max_body_size 100M;

    # Root directory — built React app
    root /usr/share/nginx/html;
    index index.html;

    # ── Static assets: long cache ──────────────────────────
    location ~* \.(js|css|woff|woff2|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── HTML: no cache (SPA must reload on deploy) ───────
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── API proxy to gateway ──────────────────────────────
    #
    # VITE_API_URL=/api/v1 → browser sends /api/v1/auth/register
    # nginx forwards full path unchanged to gateway (no trailing / on proxy_pass).
    # Gateway RouteConfig matches /api/v1/** and applies stripPrefix(1):
    #   /api/v1/auth/register → stripPrefix(1) → /v1/auth/register
    #   → identity-service @RequestMapping("/v1/auth") matches ✓
    location /api/ {
        proxy_pass http://fs-gateway:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Original-URI $request_uri;
        proxy_redirect off;
        proxy_buffering off;
        proxy_pass_request_body on;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ── SPA fallback: all non-API routes → index.html ──────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Health check endpoint ────────────────────────────────
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ── Security headers ───────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Error pages ────────────────────────────────────────
    error_page 404 500 502 503 504 /index.html;
}
