# VOLUMES & NETWORKS
# ================================================================

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  elastic_data:
  minio_data:
  kafka_data:
  zookeeper_data:
  axon_data:
  customer_nm:
  seller_nm:
  admin_nm:

networks:
  flashsale-net:
    name: flashsale-net
    driver: bridge
