# ============================================================
# DEV Profile — order-service
# Chỉ active khi SPRING_PROFILES_ACTIVE=dev
# ============================================================
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:flashsale_platform}?currentSchema=orders
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres123!}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        show_sql: false

logging:
  level:
    com.flashsale: DEBUG
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN

dev-data:
  enabled: true
  reset: ${DEV_DATA_RESET:false}

minio:
  url: ${MINIO_URL:http://localhost:9000}
  public-url: ${MINIO_PUBLIC_URL:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET_REFUND:refund-evidences}
