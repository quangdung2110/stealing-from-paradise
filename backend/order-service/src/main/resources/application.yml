server:
  port: 8083
spring:
  application:
    name: order-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  threads:
    virtual:
      enabled: true             # Virtual Threads Java 21+ — bật cho MVC, không cần cho WebFlux
  jackson:
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:flashsale_platform}?currentSchema=orders
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres123!}
    driver-class-name: org.postgresql.Driver
    hikari:
      auto-commit: true
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    schemas: orders
    default-schema: orders
    create-schemas: true
    clean-disabled: true
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: com.flashsale.commonlib.config.ByteaPostgreSQLDialect
        show_sql: false
        format_sql: false
        query.startup_check: false
        jdbc.batch_size: 10
        order_inserts: true
        order_updates: true
        id.sequence.increment_size_mismatch_strategy: fix
  kafka:
    bootstrap-servers: ${KAFKA_SERVER:localhost:9092}
    consumer:
      group-id: ${spring.application.name}-group   # Dùng trong KafkaConfig bean
axon:
  axonserver:
    servers: ${AXON_SERVER:localhost:8124}
    # Explicit context prevents the client from connecting to a different
    # context when Axon Server restarts. Must match AXONIQ_AXONSERVER_CONTEXTS.
    context: default
    # Unique component name so Axon Server can distinguish this client from
    # other services (flashsale-service, payment-service, product-service).
    component-name: ${spring.application.name}
  eventhandling:
    poolsize: 10
  serializer:
    general: xstream
  repository:
    snapshot-filter: 10
eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}
    registry-fetch-interval-seconds: 30
    initial-instance-info-replication-interval-seconds: 40
    should-enforce-registration-at-init: false
    fetch-registry: true
    register-with-eureka: true
    enabled: true

flashsale:
  infra:
    shedlock:
      enabled: true   # distributed lock for @Scheduled jobs (ShedLock)
    dlq:
      enabled: true   # Kafka consumer DLQ -> <topic>.DLT
    outbox:
      enabled: true   # Transactional Outbox pattern


logging:
  level:
    org.flywaydb: DEBUG
    org.hibernate.engine.transaction.internal.TransactionImpl: DEBUG
    # Suppress Kafka client spam logs
    org.apache.kafka: WARN
    org.springframework.kafka: WARN
    kafka: WARN
