server:
  port: 8081
spring:
  application:
    name: identity-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  threads:
    virtual:
      enabled: true             # Virtual Threads Java 21+ — bật cho MVC, không cần cho WebFlux
  jackson:
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:flashsale_platform}?currentSchema=identity
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres123!}
    driver-class-name: org.postgresql.Driver
    hikari:
      auto-commit: true
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    schemas: identity
    default-schema: identity
    create-schemas: true
    clean-disabled: true
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        show_sql: false
        query.startup_check: false
        jdbc.batch_size: 10
        order_inserts: true
        order_updates: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password: ${REDIS_PASSWORD:}
  kafka:
    bootstrap-servers: ${KAFKA_SERVER:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: ${spring.application.name}-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        spring.json.trusted.packages: com.flashsale.*
eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}
    registry-fetch-interval-seconds: 30
    initial-instance-info-replication-interval-seconds: 40
    should-enforce-registration-at-init: false
    fetch-registry: true
    register-with-eureka: true
    enabled: true

jwt:
  secret: ${JWT_SECRET:super_secret_jwt_key_for_flashsale_project_that_is_very_long_32_chars_minimum}
  expiration: ${JWT_EXPIRATION:86400}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800}



flashsale:
  infra:
    dlq:
      enabled: true   # Kafka consumer DLQ -> <topic>.DLT

logging:
  level:
    org.flywaydb: DEBUG
    org.hibernate.engine.transaction.internal.TransactionImpl: DEBUG

