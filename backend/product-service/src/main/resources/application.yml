server:
  port: 8084

spring:
  application:
    name: product-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  threads:
    virtual:
      enabled: true
  jackson:
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
  kafka:
    bootstrap-servers: ${KAFKA_SERVER:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: ${spring.application.name}-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        spring.json.trusted.packages: com.flashsale.*
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        query.startup_check: false
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    schemas: product
    default-schema: product
    create-schemas: true
    clean-disabled: true
  sql:
    init:
      mode: never
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:flashsale_platform}?currentSchema=product
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres123!}
    driver-class-name: org.postgresql.Driver
    hikari:
      auto-commit: true
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password: ${REDIS_PASSWORD:}
      timeout: 60000ms
  task:
    execution:
      pool:
        core-size: 4
        max-size: 16
        queue-capacity: 100

minio:
  url: ${MINIO_URL:http://localhost:9000}
  public-url: ${MINIO_PUBLIC_URL:http://localhost:9000}
  access-key: ${MINIO_ROOT_USER:minioadmin}
  secret-key: ${MINIO_ROOT_PASSWORD:minioadmin}
  bucket: ${MINIO_BUCKET:product-images}

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}
    registry-fetch-interval-seconds: 30
    initial-instance-info-replication-interval-seconds: 40
    should-enforce-registration-at-init: false
    fetch-registry: true
    register-with-eureka: true
    enabled: true

reservation:
  cleanup:
    interval-ms: 300000
  ttl-minutes: 15

# Stock cache config: Redis Lua is now the hot path for race-condition-free
# stock reservation at checkout. The DB remains the source of truth.
stock:
  cache:
    key-prefix: "stock:available:"
  reconciliation:
    enabled: true
    interval-ms: 300000
    sample-size: 1000

kafka:
  topics:
    order-created: order.created
    order-cancelled: order.cancelled
    order-returned: order.returned
    flash-sale-session-started: flash_sale.session_started
    flash-sale-session-ended: flash_sale.session_ended

flashsale:
  infra:
    shedlock:
      enabled: true   # distributed lock for @Scheduled jobs (ShedLock)
    dlq:
      enabled: true   # Kafka consumer DLQ -> <topic>.DLT

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
