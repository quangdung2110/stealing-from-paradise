server:
  port: ${SERVER_PORT:8080}
  address: ${SERVER_BIND:0.0.0.0}
spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8080}
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders:
              - Content-Type
              - Authorization
              - X-Requested-With
              - Accept
              - Origin
              - X-User-Id
              - X-User-Email
              - X-User-Role
              - X-Token-Jti
            exposedHeaders:
              - X-User-Id
              - X-User-Email
              - X-User-Role
              - X-Token-Jti
            allowCredentials: true
            maxAge: 3600
      locator:
        enabled: true
        lower-case-service-id: true
      routes: []
  httpclient:
    pool:
      type: elastic
      maxConnections: 500
    connect-timeout: 10000
    response-timeout: 30s
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password: ${REDIS_PASSWORD:}
jwt:
  secret: ${JWT_SECRET:your-very-secret-key-for-hs256-algorithm-minimum-32-characters-long}
  expiration: ${JWT_EXPIRATION:86400}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway,prometheus

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}
    registry-fetch-interval-seconds: 30
    initial-instance-info-replication-interval-seconds: 40
    should-enforce-registration-at-init: false
    fetch-registry: true
    register-with-eureka: true
    enabled: true