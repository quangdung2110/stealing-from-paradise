# ============================================================
# PROD Profile — payment-service
# Active when SPRING_PROFILES_ACTIVE=prod
# ============================================================
spring:
  jpa:
    show-sql: false
    properties:
      hibernate:
        show_sql: false
        format_sql: false

logging:
  level:
    root: INFO
    com.flashsale: INFO
    org.flywaydb: WARN
    org.hibernate.engine.transaction.internal.TransactionImpl: WARN
    org.hibernate.SQL: WARN
    org.springframework.security: WARN
    com.flashsale.commonlib.filter: WARN
    org.apache.kafka: WARN
    org.springframework.kafka: WARN
    kafka: WARN

dev-data:
  enabled: false
