# Nginx Reverse Proxy for FlashSale Platform
# Entry point: all traffic goes here → routes to appropriate service
#
# Routing:
#   /api/*    → API Gateway (Spring Boot)
#   /seller/* → Seller App SPA
#   /admin/*  → Admin App SPA
#   /*        → Customer App SPA (default)
#
# NOTE: This file is NOT used by the running container. The actual
# nginx config is generated by docker-entrypoint.sh via quoted heredoc.
# This file is kept as documentation only — to modify the running
# config, edit docker-entrypoint.sh instead.
#
# API Path Flow (VITE_API_URL=/api/v1):
#   Browser → /api/v1/auth/register
#   nginx location /api/ → proxy_pass http://gateway (no trailing /)
#   → gateway receives /api/v1/auth/register (full path unchanged)
#   → gateway RouteConfig matches /api/v1/** → stripPrefix(1) removes /api
#   → /v1/auth/register → identity @RequestMapping("/v1/auth") matches ✓
#
# Rate limiting directives (defined in http context by docker-entrypoint.sh):
#   limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
#   limit_req_zone $binary_remote_addr zone=frontend_limit:10m rate=20r/s;

upstream gateway {
    server __GATEWAY_HOST__:__GATEWAY_PORT__;
}

upstream customer-app {
    server __CUSTOMER_HOST__:__CUSTOMER_PORT__;
}

upstream seller-app {
    server __SELLER_HOST__:__SELLER_PORT__;
}

upstream admin-app {
    server __ADMIN_HOST__:__ADMIN_PORT__;
}

server {
    listen ${NGINX_PORT:-80};
    server_name _;

    real_ip_header X-Real-IP;
    real_ip_recursive on;

    location /api/ {
        proxy_pass http://gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_pass_request_body on;
        proxy_redirect off;
        proxy_buffering off;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /seller/ {
        proxy_pass http://seller-app/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location /admin/ {
        proxy_pass http://admin-app/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location / {
        proxy_pass http://customer-app/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location /health {
        access_log off;
        default_type text/plain;
        return 200 "healthy\n";
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    error_page 500 502 503 504 @error;
    location @error {
        default_type text/plain;
        return 503 "Service temporarily unavailable";
    }
}
