openapi: "3.0.3"
info:
  title: Notification Service - SSE Stream API
  description: |
    Server-Sent Events endpoint for real-time notification delivery.
    Notification service (Port 8092). MongoDB storage. Consumer-only Kafka.
  version: "5.4"
  contact:
    name: Notification Service Team

servers:
  - url: http://localhost:8092/api/v1
    description: Local development

paths:
  /notifications/stream:
    get:
      operationId: streamNotifications
      summary: SSE real-time notification stream
      description: |
        Establish a persistent SSE connection. Server pushes notifications
        as they arrive via Kafka -> Redis Pub/Sub -> SSE.
        Client uses EventSource API. Supports replay via Last-Event-ID header.
      tags:
        - Notifications
      security:
        - BearerAuth: []
      parameters:
        - name: Last-Event-ID
          in: header
          required: false
          schema:
            type: string
          description: ID of last received event for replay of missed events
      responses:
        "200":
          description: SSE stream opened successfully
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  SSE event stream. Each event is a `data:` line with JSON payload.
                  Format: `data: {"id":"...","type":"...","title":"...","body":"...","metadata":{...},"created_at":"..."}\n\n`
              example: |
                data: {"id":"64f3a","type":"REFUND_APPROVED","title":"Hoan tien thanh cong","body":"Yeu cau hoan 350.000d da duoc duyet","metadata":{"deeplink":"/orders/100/refunds/88"},"created_at":"2026-04-15T10:00:00Z"}

                data: {"id":"64f3b","type":"ORDER_SHIPPED","title":"Don hang dang giao","body":"Ma van don: VT123456789","metadata":{"deeplink":"/orders/100"},"created_at":"2026-04-15T10:05:00Z"}
        "401":
          description: JWT invalid or missing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notifications:
    get:
      operationId: getNotificationHistory
      summary: Paginated notification history
      description: |
        Returns paginated list of user's past notifications from MongoDB.
        Supports filtering by read status.
      tags:
        - Notifications
      security:
        - BearerAuth: []
      parameters:
        - name: is_read
          in: query
          required: false
          schema:
            type: boolean
          description: Filter by read status (true=read, false=unread, omit=all)
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
          description: Page index (0-based)
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Page size
      responses:
        "200":
          description: Paginated notification list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationPage"
        "401":
          description: JWT invalid or missing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token from Identity Service

  schemas:
    Notification:
      type: object
      required:
        - id
        - type
        - title
        - body
        - is_read
        - created_at
      properties:
        id:
          type: string
          description: MongoDB ObjectId
          example: "64f3a1b2c3d4e5f6a7b8c9d0"
        user_id:
          type: integer
          format: int64
          description: FK to USERS.id
          example: 42
        title:
          type: string
          example: "Hoan tien thanh cong"
        body:
          type: string
          example: "Yeu cau hoan 350.000d da duoc duyet"
        type:
          type: string
          enum:
            - ORDER_CREATED
            - ORDER_PAID
            - ORDER_SHIPPED
            - ORDER_DELIVERED
            - ORDER_CANCELLED
            - ORDER_AUTO_CANCELLED
            - REFUND_REQUESTED
            - REFUND_APPROVED
            - REFUND_REJECTED
            - FLASH_SALE_STARTING
            - FLASH_SALE_ENDED
            - FS_ITEM_APPROVED
            - FS_ITEM_REJECTED
            - PRODUCT_APPROVED
            - PRODUCT_REJECTED
            - STRIPE_ACCOUNT_SUSPENDED
        metadata:
          type: object
          additionalProperties: true
          description: Supplementary data (deeplink, entity IDs)
          example:
            deeplink: "/orders/100/refunds/88"
            refund_id: 88
        is_read:
          type: boolean
          example: false
        created_at:
          type: string
          format: date-time
          example: "2026-04-15T10:00:00Z"

    NotificationPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/Notification"
        total_elements:
          type: integer
          example: 24
        page_number:
          type: integer
          example: 0
        page_size:
          type: integer
          example: 20

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: "Unauthorized"
        message:
          type: string
          example: "Invalid or expired JWT token"
