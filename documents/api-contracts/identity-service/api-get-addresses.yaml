openapi: "3.0.3"
info:
  title: Identity Service - Address Management
  description: CRUD operations for user shipping addresses
  version: "5.4"
servers:
  - url: http://localhost:8081/api/v1
    description: Identity Service (local)
paths:
  /users/me/addresses:
    get:
      operationId: listAddresses
      summary: List user addresses
      description: >
        Returns all addresses for the authenticated user.
        Default address (is_default=true) appears first.
        Referenced by UC-IDENTITY-004, FR-IDENTITY-009.
      tags:
        - Addresses
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Address list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Address"
              example:
                - address_id: 7
                  province_id: 79
                  district_id: 760
                  full_address: "123 Nguyen Trai, Ward 2"
                  is_default: true
    post:
      operationId: createAddress
      summary: Add new address
      description: >
        Creates a new address. If is_default=true, unsets all other defaults.
        Referenced by UC-IDENTITY-004, FR-IDENTITY-009.
      tags:
        - Addresses
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - province_id
                - district_id
                - full_address
              properties:
                province_id:
                  type: integer
                  description: Province/city code
                district_id:
                  type: integer
                  description: District code
                full_address:
                  type: string
                  description: Full street address
                is_default:
                  type: boolean
                  default: false
              example:
                province_id: 79
                district_id: 760
                full_address: "123 Nguyen Trai, Ward 2"
                is_default: false
      responses:
        "201":
          description: Address created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Address"
  /users/me/addresses/{addressId}:
    put:
      operationId: updateAddress
      summary: Update or set default address
      description: >
        Updates address fields. All fields optional.
        If is_default=true, unsets all other defaults.
        Referenced by UC-IDENTITY-004, FR-IDENTITY-009.
      tags:
        - Addresses
      security:
        - bearerAuth: []
      parameters:
        - name: addressId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                province_id:
                  type: integer
                district_id:
                  type: integer
                full_address:
                  type: string
                is_default:
                  type: boolean
              example:
                province_id: 79
                district_id: 760
                full_address: "456 Le Loi, Ward 1"
                is_default: true
      responses:
        "200":
          description: Address updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Address"
        "404":
          description: Address not found or does not belong to user
    delete:
      operationId: deleteAddress
      summary: Delete address
      description: >
        Deletes an address. Cannot delete the only default address (BR-IDENTITY-006).
        Referenced by UC-IDENTITY-004, FR-IDENTITY-009.
      tags:
        - Addresses
      security:
        - bearerAuth: []
      parameters:
        - name: addressId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Address deleted
        "400":
          description: Cannot delete the only default address (BR-IDENTITY-006)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Address not found or does not belong to user
components:
  schemas:
    Address:
      type: object
      properties:
        address_id:
          type: integer
          format: int64
        province_id:
          type: integer
        district_id:
          type: integer
        full_address:
          type: string
        is_default:
          type: boolean
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        status_code:
          type: integer
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
