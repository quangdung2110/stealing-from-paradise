openapi: "3.0.3"
info:
  title: Identity Service - POST /users/me/change-password
  description: Change current user password
  version: "5.4"
servers:
  - url: http://localhost:8081/api/v1
    description: Identity Service (local)
paths:
  /users/me/change-password:
    post:
      operationId: changePassword
      summary: Đổi mật khẩu
      description: >
        Changes the authenticated user's password.
        Requires the old password for verification.
        New password must meet strength requirements (min 8 chars, >=1 uppercase, >=1 digit).
        Referenced by UC-IDENTITY-003, FR-IDENTITY-011, BR-IDENTITY-002.
      tags:
        - User Profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - old_password
                - new_password
              properties:
                old_password:
                  type: string
                  minLength: 1
                  description: Current password for verification
                new_password:
                  type: string
                  minLength: 8
                  description: New password (min 8 chars, >=1 uppercase, >=1 digit)
              example:
                old_password: "OldPass123!"
                new_password: "NewPass456!"
      responses:
        "200":
          description: Password changed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
              example:
                success: true
                message: "Password changed successfully"
        "400":
          description: Old password incorrect or new password too weak (INVALID_PASSWORD)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "INVALID_PASSWORD"
                message: "Old password is incorrect or new password does not meet requirements"
                status_code: 400
        "401":
          description: Token invalid or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        status_code:
          type: integer
