openapi: "3.0.3"
info:
  title: Identity Service - Admin User Listing
  description: >
    Admin-only endpoints for listing and viewing user accounts.
    All endpoints require ADMIN role (BR-IDENTITY-008).
  version: "5.4"
servers:
  - url: http://localhost:8081/api/v1
    description: Identity Service (local)
paths:
  /admin/users:
    get:
      operationId: listUsers
      summary: List all users (admin)
      description: >
        Returns a paginated list of all users with optional filters.
        Requires ADMIN role. Referenced by FR-IDENTITY-011.
      tags:
        - Admin
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Page number (1-based)
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Page size
        - name: role
          in: query
          required: false
          schema:
            type: string
            enum: [BUYER, SELLER, ADMIN]
          description: Filter by user role
        - name: search
          in: query
          required: false
          schema:
            type: string
            minLength: 1
          description: >
            Search by username, email, or full_name (case-insensitive LIKE).
            Matches any partial substring.
      responses:
        "200":
          description: Paginated user list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserList"
              example:
                data:
                  - user_id: 42
                    username: "nguyen_van_a"
                    email: "a@example.com"
                    phone: "0901234567"
                    full_name: "Nguyen Van A"
                    role: "BUYER"
                    status: "ACTIVE"
                    created_at: "2024-01-15T08:00:00Z"
                    updated_at: "2026-04-15T10:30:00Z"
                  - user_id: 43
                    username: "seller_01"
                    email: "seller@example.com"
                    phone: "0901234568"
                    full_name: "Tran Thi B"
                    role: "SELLER"
                    status: "ACTIVE"
                    created_at: "2024-02-20T09:00:00Z"
                    updated_at: "2026-04-10T14:00:00Z"
                pagination:
                  page: 1
                  size: 20
                  total_elements: 156
                  total_pages: 8
        "401":
          description: Token invalid or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden, requires ADMIN role (BR-IDENTITY-008)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "FORBIDDEN"
                message: "Admin access required"
                status_code: 403

  /admin/users/{userId}:
    get:
      operationId: getUserDetail
      summary: Get single user detail (admin)
      description: >
        Returns full detail for a single user by ID.
        Requires ADMIN role. Referenced by FR-IDENTITY-011.
      tags:
        - Admin
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: User ID
      responses:
        "200":
          description: User detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserDetail"
              example:
                user_id: 42
                username: "nguyen_van_a"
                email: "a@example.com"
                phone: "0901234567"
                full_name: "Nguyen Van A"
                role: "BUYER"
                status: "ACTIVE"
                addresses:
                  - id: 1
                    province_id: 1
                    district_id: 10
                    full_address: "123 Le Loi, District 1, Ho Chi Minh City"
                    is_default: true
                created_at: "2024-01-15T08:00:00Z"
                updated_at: "2026-04-15T10:30:00Z"
        "401":
          description: Token invalid or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden, requires ADMIN role (BR-IDENTITY-008)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    AdminUserSummary:
      type: object
      properties:
        user_id:
          type: integer
          format: int64
        username:
          type: string
        email:
          type: string
        phone:
          type: string
        full_name:
          type: string
        role:
          type: string
          enum: [BUYER, SELLER, ADMIN]
        status:
          type: string
          enum: [ACTIVE]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    AdminUserDetail:
      type: object
      properties:
        user_id:
          type: integer
          format: int64
        username:
          type: string
        email:
          type: string
        phone:
          type: string
        full_name:
          type: string
        role:
          type: string
          enum: [BUYER, SELLER, ADMIN]
        status:
          type: string
          enum: [ACTIVE]
        addresses:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                format: int64
              province_id:
                type: integer
              district_id:
                type: integer
              full_address:
                type: string
              is_default:
                type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    AdminUserList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AdminUserSummary"
        pagination:
          type: object
          properties:
            page:
              type: integer
            size:
              type: integer
            total_elements:
              type: integer
              format: int64
            total_pages:
              type: integer
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        status_code:
          type: integer
