openapi: "3.0.3"
info:
  title: Identity Service - PUT /users/me/addresses/{addressId}
  description: Update an existing shipping address
  version: "5.4"
servers:
  - url: http://localhost:8081/api/v1
    description: Identity Service (local)
paths:
  /users/me/addresses/{addressId}:
    put:
      operationId: updateAddress
      summary: Cập nhật địa chỉ
      description: >
        Updates address fields for the authenticated user.
        All fields are optional; only provided fields are updated.
        If is_default=true, all other defaults are unset.
        Referenced by UC-IDENTITY-004, FR-IDENTITY-009.
      tags:
        - Addresses
      security:
        - bearerAuth: []
      parameters:
        - name: addressId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Address ID to update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                province_id:
                  type: integer
                  description: Province/city code
                district_id:
                  type: integer
                  description: District code
                full_address:
                  type: string
                  description: Full street address
                is_default:
                  type: boolean
                  description: Set as default address
              example:
                province_id: 79
                district_id: 760
                full_address: "456 Le Loi, Ward 1"
                is_default: true
      responses:
        "200":
          description: Address updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddressResponse"
              example:
                id: 7
                userId: 42
                provinceId: 79
                districtId: 760
                fullAddress: "456 Le Loi, Ward 1"
                isDefault: true
                createdAt: "2026-04-15T10:30:00Z"
        "400":
          description: Validation failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Token invalid or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Address not found or does not belong to user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    AddressResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        provinceId:
          type: integer
        districtId:
          type: integer
        fullAddress:
          type: string
        isDefault:
          type: boolean
        createdAt:
          type: string
          format: date-time
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        status_code:
          type: integer
