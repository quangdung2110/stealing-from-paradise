openapi: "3.0.3"
info:
  title: Identity Service - User Profile
  description: >
    Current user profile read/update, avatar presigned URL, and password change.
    All endpoints require JWT authentication.
  version: "5.4"
servers:
  - url: http://localhost:8081/api/v1
    description: Identity Service (local)
paths:
  /users/me:
    get:
      operationId: getUserProfile
      summary: Get current user profile
      description: >
        Returns the authenticated user's profile information.
        Referenced by UC-IDENTITY-003, FR-IDENTITY-007.
      tags:
        - User Profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
              example:
                user_id: 42
                username: "nguyen_van_a"
                email: "a@example.com"
                phone: "0901234567"
                full_name: "Nguyen Van A"
                status: "ACTIVE"
                created_at: "2024-01-15T08:00:00Z"
        "401":
          description: Token invalid or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      operationId: updateUserProfile
      summary: Update current user profile
      description: >
        Updates the authenticated user's profile fields.
        All fields are optional; only provided fields are updated.
        Referenced by UC-IDENTITY-003, FR-IDENTITY-008.
      tags:
        - User Profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                full_name:
                  type: string
                  minLength: 2
                  maxLength: 100
                  description: Updated display name
                phone:
                  type: string
                  description: Vietnamese phone number, must be unique
                email:
                  type: string
                  format: email
                  description: Must be unique
              example:
                full_name: "Nguyen Van A"
                phone: "0901234567"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
              example:
                user_id: 42
                username: "nguyen_van_a"
                email: "a@example.com"
                phone: "0901234567"
                full_name: "Nguyen Van A"
                status: "ACTIVE"
                created_at: "2024-01-15T08:00:00Z"
                updated_at: "2026-04-15T10:30:00Z"
        "400":
          description: Validation failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Token invalid or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: New phone or email already exists (BR-IDENTITY-001)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /users/me/avatar/presigned-url:
    get:
      operationId: getAvatarPresignedUrl
      summary: Get presigned URL for avatar upload
      description: >
        Returns a MinIO presigned PUT URL for direct avatar upload.
        Bucket: user-avatars. Object key: {user_id}/{uuid}.{ext}. TTL: 15 minutes.
        Max file size: 10MB. Accepted MIME types: image/jpeg, image/png, image/webp.
        After upload, use the CDN URL in PUT /users/me to save the avatar reference.
        Referenced by UC-IDENTITY-003, FR-IDENTITY-010.
      tags:
        - User Profile
      security:
        - bearerAuth: []
      parameters:
        - name: content_type
          in: query
          required: true
          schema:
            type: string
            enum: [image/jpeg, image/png, image/webp]
          description: MIME type of the image to upload
      responses:
        "200":
          description: Presigned upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvatarPresignedUrlResponse"
              example:
                upload_url: "https://minio.internal/user-avatars/42/uuid.jpg?X-Amz-Signature=..."
                object_key: "42/uuid.jpg"
                cdn_url: "https://cdn.marketplace.vn/avatars/42/uuid.jpg"
                expires_in: 900
        "401":
          description: Token invalid or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Invalid content_type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /users/me/change-password:
    post:
      operationId: changePassword
      summary: Change password
      description: >
        Changes the authenticated user's password. Requires the old password for verification.
        New password must meet strength requirements (min 8 chars, >=1 uppercase, >=1 digit).
        Referenced by UC-IDENTITY-003, FR-IDENTITY-011, BR-IDENTITY-002.
      tags:
        - User Profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - old_password
                - new_password
              properties:
                old_password:
                  type: string
                  minLength: 1
                  description: Current password for verification
                new_password:
                  type: string
                  minLength: 8
                  description: New password (min 8 chars, >=1 uppercase, >=1 digit)
              example:
                old_password: "OldPass123!"
                new_password: "NewPass456!"
      responses:
        "200":
          description: Password changed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "Password changed successfully"
        "400":
          description: Old password incorrect or new password too weak (BR-IDENTITY-002)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Token invalid or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    UserProfile:
      type: object
      properties:
        user_id:
          type: integer
          format: int64
        username:
          type: string
        email:
          type: string
        phone:
          type: string
        full_name:
          type: string
        status:
          type: string
          enum: [ACTIVE]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    AvatarPresignedUrlResponse:
      type: object
      properties:
        upload_url:
          type: string
          format: uri
          description: Presigned PUT URL for MinIO direct upload
        object_key:
          type: string
          description: MinIO object key (user_id/uuid.ext)
        cdn_url:
          type: string
          format: uri
          description: Public CDN URL after upload
        expires_in:
          type: integer
          description: TTL in seconds (900 = 15 minutes)
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        status_code:
          type: integer
