openapi: "3.0.3"
info:
  title: Identity Service - POST /auth/logout
  description: Logout and invalidate access token
  version: "5.4"
servers:
  - url: http://localhost:8081/api/v1
    description: Identity Service (local)
paths:
  /auth/logout:
    post:
      operationId: logout
      summary: Đăng xuất và thu hồi token
      description: >
        Invalidates the current access token (JTI added to blocklist).
        Requires valid Authorization Bearer token and X-Access-Token header.
        Referenced by UC-IDENTITY-002, FR-IDENTITY-005.
      tags:
        - Authentication
      security:
        - bearerAuth: []
      parameters:
        - name: X-Access-Token
          in: header
          required: true
          schema:
            type: string
          description: Access token to invalidate
      responses:
        "200":
          description: Logout successful, token invalidated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
              example:
                success: true
                message: "Logout successful, token invalidated"
        "401":
          description: Token invalid or expired (AUTH_004)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "AUTH_004"
                message: "Token invalid or expired"
                status_code: 401
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        status_code:
          type: integer
