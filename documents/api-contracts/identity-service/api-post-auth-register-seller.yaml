openapi: "3.0.3"
info:
  title: Identity Service - Seller Registration
  description: >
    Register a new seller account. Creates USERS record with role SELLER,
    SELLERS record, and ROLES entry. Publishes account.created to Kafka.
  version: "5.4"
servers:
  - url: http://localhost:8081/api/v1
    description: Identity Service (local)
paths:
  /auth/register/seller:
    post:
      operationId: registerSeller
      summary: Register as a seller
      description: >
        Creates a new user account with SELLER role.
        Also creates a SELLERS record and ROLES entry.
        Publishes account.created event to Kafka topic.
        Same validation rules as /auth/register (BR-IDENTITY-002).
        Referenced by UC-IDENTITY-006, FR-IDENTITY-001.
      tags:
        - Seller Registration
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterSellerRequest"
            example:
              username: "shop_nike_vn"
              email: "shop@nike.vn"
              phone: "0987654321"
              password: "SecurePass123!"
              full_name: "Shop Nike Vietnam"
      responses:
        "201":
          description: Seller account created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterSellerResponse"
              example:
                user_id: 42
                username: "shop_nike_vn"
                email: "shop@nike.vn"
                phone: "0987654321"
                full_name: "Shop Nike Vietnam"
                roles:
                  - "SELLER"
                status: "ACTIVE"
                created_at: "2026-04-15T08:00:00Z"
        "400":
          description: Validation failure (BR-IDENTITY-002)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "VALIDATION_ERROR"
                message: "Password must contain at least 1 uppercase and 1 digit"
                status_code: 400
        "409":
          description: Duplicate username, email, or phone (BR-IDENTITY-001)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "DUPLICATE"
                message: "username already exists"
                status_code: 409

components:
  schemas:
    RegisterSellerRequest:
      type: object
      required:
        - username
        - email
        - phone
        - password
        - full_name
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
          pattern: "^[a-z0-9._]+$"
          description: Unique seller username
        email:
          type: string
          format: email
          description: Unique email address
        phone:
          type: string
          description: Vietnamese phone number, unique
        password:
          type: string
          minLength: 8
          description: Min 8 chars, >=1 uppercase, >=1 digit
        full_name:
          type: string
          minLength: 2
          maxLength: 100
          description: Store / business display name
    RegisterSellerResponse:
      type: object
      properties:
        user_id:
          type: integer
          format: int64
        username:
          type: string
        email:
          type: string
        phone:
          type: string
        full_name:
          type: string
        roles:
          type: array
          items:
            type: string
            enum: [SELLER]
          description: Assigned roles
        status:
          type: string
          enum: [ACTIVE]
        created_at:
          type: string
          format: date-time
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        status_code:
          type: integer
