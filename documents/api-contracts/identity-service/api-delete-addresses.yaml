openapi: "3.0.3"
info:
  title: Identity Service - DELETE /users/me/addresses/{addressId}
  description: Delete a shipping address
  version: "5.4"
servers:
  - url: http://localhost:8081/api/v1
    description: Identity Service (local)
paths:
  /users/me/addresses/{addressId}:
    delete:
      operationId: deleteAddress
      summary: Xóa địa chỉ
      description: >
        Deletes an address belonging to the authenticated user.
        Referenced by UC-IDENTITY-004, FR-IDENTITY-009.
      tags:
        - Addresses
      security:
        - bearerAuth: []
      parameters:
        - name: addressId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Address ID to delete
      responses:
        "200":
          description: Address deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
              example:
                success: true
                message: "Address deleted"
        "401":
          description: Token invalid or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Address not found or does not belong to user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        status_code:
          type: integer
