      properties:
        reservation_id:
          type: string
          format: uuid
          example: "11111111-2222-3333-4444-555555555555"
        variant_id:
          type: string
          format: uuid
        session_id:
          type: string
        quantity:
          type: integer
        status:
          type: string
          enum: [pending, confirmed, released]
          example: "pending"
        expires_at:
          type: string
          format: date-time
          example: "2026-05-10T10:15:00Z"
        created_at:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        code:
          type: string
        message:
          type: string
        requested:
