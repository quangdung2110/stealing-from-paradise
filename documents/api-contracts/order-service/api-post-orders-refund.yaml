openapi: "3.0.3"
info:
  title: Order Service - Refund Query & Detail API
  description: >
    Refund listing, detail, status queries, and evidence image pre-signed URLs.
    Covers multi-seller partial refunds, full parent-order refund, and buyer-side
    refund history with pagination and filtering.
    Order Service (Port 8083).
  version: "5.4"
servers:
  - url: http://localhost:8083/api/v1
    description: Local development
tags:
  - name: Refund Queries
    description: Buyer and admin refund listing/detail endpoints
  - name: Parent Refund
    description: Parent-order-level refund operations
paths:
  /orders/parent/{parentOrderId}/refunds/partial:
    post:
      tags:
        - Parent Refund
      summary: Request partial multi-seller refund
      description: >
        Buyer requests partial refund across multiple sub-orders under a parent order.
        Each item specifies which sub-order and which order_item to refund.
        Produces refund.requested Kafka event.
      operationId: requestPartialMultiSellerRefund
      security:
        - bearerAuth: []
      parameters:
        - name: parentOrderId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Parent order ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartialMultiSellerRefundRequest"
      responses:
        "201":
          description: Multi-seller partial refund submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefundResponse"

  /orders/parent/{parentOrderId}/refund:
    get:
      tags:
        - Parent Refund
      summary: View full parent-order refund status
      description: >
        Returns the full refund status for a parent order.
        Accessible by the buyer or admin.
      operationId: getParentRefundStatus
      security:
        - bearerAuth: []
      parameters:
        - name: parentOrderId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Parent order ID
      responses:
        "200":
          description: Parent order refund status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParentRefundStatus"
        "403":
          description: Not the buyer or not an admin

  /orders/{orderId}/refunds:
    get:
      tags:
        - Refund Queries
      summary: List refunds for a sub-order
      description: >
        Returns all refund requests for a specific sub-order.
        Accessible by buyer, seller, or admin.
      operationId: listOrderRefunds
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Sub-order ID
      responses:
        "200":
          description: List of refunds for this order
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RefundSummary"
        "403":
          description: Not buyer, seller, or admin for this order

  /orders/{orderId}/refunds/{refundId}:
    get:
      tags:
        - Refund Queries
      summary: Get refund detail
      description: >
        Returns full detail of a single refund request including items and evidence.
        Accessible by buyer or admin.
      operationId: getRefundDetail
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Sub-order ID
        - name: refundId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Refund ID
      responses:
        "200":
          description: Refund detail with items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefundDetail"
              example:
                success: true
                data:
                  refund_id: 88
                  transaction_id: 200
                  order_id: 101
                  type: "PARTIAL"
                  amount: 250000
                  status: "SUCCESS"
                  items:
                    - order_item_id: 501
                      quantity: 1
                      refund_amount: 250000
                  admin_note: null
                  reviewed_by: null
                  created_at: "2025-11-01T08:00:00Z"
        "403":
          description: Not buyer or admin

  /orders/refunds:
    get:
      tags:
        - Refund Queries
      summary: List all buyer's refunds
      description: >
        Returns paginated list of all refund requests for the authenticated buyer.
        Supports filtering by status, type, and date range.
      operationId: listBuyerRefunds
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [PENDING, SUCCESS, FAILED, REJECTED]
          description: Filter by refund status
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [FULL, PARTIAL]
          description: Filter by refund type
        - name: from_date
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Filter by creation date (ISO 8601)
        - name: to_date
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Filter by creation date (ISO 8601)
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: Page number (zero-indexed)
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: Page size
      responses:
        "200":
          description: Paginated refund list
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items:
                      $ref: "#/components/schemas/RefundSummary"
                  totalPages:
                    type: integer
                  totalElements:
                    type: integer
                  pageNumber:
                    type: integer
                  pageSize:
                    type: integer
        "401":
          description: Not authenticated

  /orders/{orderId}/refunds/presigned-url:
    get:
      tags:
        - Refund Queries
      summary: Get refund evidence image presigned URL
      description: >
        Returns a MinIO presigned PUT URL for uploading refund evidence images.
        Bucket: refund-evidence. TTL: 15 minutes.
        Referenced by FR-ORDER-013.
      operationId: getRefundEvidencePresignedUrl
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Sub-order ID for evidence upload
        - name: file_name
          in: query
          required: true
          schema:
            type: string
          description: Original filename (e.g., "evidence-1.jpg")
        - name: content_type
          in: query
          required: true
          schema:
            type: string
            enum: [image/jpeg, image/png, image/webp]
          description: MIME type of the image
      responses:
        "200":
          description: Presigned upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PresignedUrlResponse"
              example:
                success: true
                data:
                  presigned_url: "https://minio.internal/refund-evidence/orders/100/uuid-abc.jpg"
                  object_url: "https://cdn.marketplace.vn/refund-evidence/orders/100/uuid-abc.jpg"
                  expires_in: 900
        "403":
          description: Not the order buyer
        "422":
          description: Invalid content_type

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    PartialMultiSellerRefundRequest:
      type: object
      required:
        - reason
        - items
      properties:
        reason:
          type: string
          minLength: 1
          maxLength: 1000
          description: Overall refund reason
        items:
          type: array
          minItems: 1
          items:
            type: object
            required:
              - order_id
              - order_item_id
              - quantity
              - item_reason
            properties:
              order_id:
                type: integer
                format: int64
                description: Sub-order ID the item belongs to
              order_item_id:
                type: integer
                format: int64
                description: Order item to refund
              quantity:
                type: integer
                minimum: 1
                description: Must be <= order_item.quantity - refunded_quantity
              item_reason:
                type: string
                minLength: 1
                maxLength: 500
        evidence_images:
          type: array
          maxItems: 5
          items:
            type: string
            format: uri
          description: Pre-uploaded evidence image URLs

    RefundResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            group_ref:
              type: string
              format: uuid
            order_id:
              type: integer
              format: int64
            type:
              type: string
              enum: [FULL, PARTIAL]
            status:
              type: string
              enum: [PENDING]
            total_amount:
              type: number
              format: double
            refund_amount:
              type: number
              format: double
            item_count:
              type: integer
            message:
              type: string

    ParentRefundStatus:
      type: object
      properties:
        parent_order_id:
          type: integer
          format: int64
        refunds:
          type: array
          items:
            $ref: "#/components/schemas/RefundSummary"
        total_refunded:
          type: number
          format: double
        status:
          type: string
          enum: [PENDING, PARTIAL, COMPLETE]

    RefundSummary:
      type: object
      properties:
        refund_id:
          type: integer
          format: int64
        transaction_id:
          type: integer
          format: int64
        order_id:
          type: integer
          format: int64
        order_code:
          type: string
        type:
          type: string
          enum: [FULL, PARTIAL]
        amount:
          type: number
          format: double
        status:
          type: string
          enum: [PENDING, SUCCESS, FAILED, REJECTED]
        reason:
          type: string
        created_at:
          type: string
          format: date-time

    RefundDetail:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            refund_id:
              type: integer
              format: int64
            transaction_id:
              type: integer
              format: int64
            order_id:
              type: integer
              format: int64
            type:
              type: string
              enum: [FULL, PARTIAL]
            amount:
              type: number
              format: double
            status:
              type: string
              enum: [PENDING, SUCCESS, FAILED, REJECTED]
            reason:
              type: string
            items:
              type: array
              items:
                type: object
                properties:
                  order_item_id:
                    type: integer
                    format: int64
                  quantity:
                    type: integer
                  refund_amount:
                    type: number
                    format: double
                  item_reason:
                    type: string
                  status:
                    type: string
            evidence_images:
              type: array
              items:
                type: string
                format: uri
            admin_note:
              type: string
              nullable: true
            reviewed_by:
              type: integer
              format: int64
              nullable: true
            refund_ref:
              type: string
              nullable: true
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time

    PresignedUrlResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            presigned_url:
              type: string
              format: uri
              description: PUT URL for MinIO direct upload
            object_url:
              type: string
              format: uri
              description: Public CDN URL after upload
            expires_in:
              type: integer
              description: TTL in seconds (900)
